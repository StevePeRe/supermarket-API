services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: supermarket
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d supermarket"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      APP_NAME: "Supermarket API"
      USE_POSTGRES: "true"
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: supermarket
      DB_USER: root
      DB_PASSWORD: password
      REDIS_URL: "redis://redis:6379/0"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  pgdata:
